<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="./assets/icon.png">
    <title>Markup</title>
</head>
<body>
    <header>
        <img src="./assets/logo.png" alt="">
        <div class="textos">
            <h1>Character Counter</h1>
        </div>
        <div>
            <button>☼</button>
        </div>
    </header>
    <main>
        <h2>Analyze your text <br>in real-time.</h2>
        <div id="words">
            <textarea name="" id="area_texto">Design is the silent ambassador of your brand. Simplicity is key to effective communication, creating clarity in every interaction. A great design transforms complex ideas into elegant solutions, making them easy to understand. It blends aesthetics and functionality seamlessly.</textarea>
        </div>
        <section class="checkboxes">
            <label><input type="checkbox"> Exclude Spaces</label>
            <label><input type="checkbox"> Set Character Limit</label>
                <p>Approx. reading time &lt;1 minute</p>
        
        </section>
        <section id="scores">
            <div class="score-1">
                <article class="background background-1">
                    <div class="number">
                        278
                    </div>
                    <div class="paragraph">
                        <p>
                            Total Characters
                        </p>
                    </div>
                </article>
            </div>
            <article class="background background-2">
                <div class="number">
                    39
                </div>
                <div class="paragraph">
                    <p>
                        Word Count
                    </p>
                </div>
            </article>
            <article class="background background-3">
                <div class="number">
                    04
                </div>
                <div class="paragraph">
                    <p>
                        Sentence Count
                    </p>
                </div>
            </article>
        </section>
        <section id="barSection">
            <h3>Letter Density</h3>
            <ul id="barCharts">
                <li class="letter">
                    <div class="letters">
                        <p>E</p>
                    </div>
                    <div class="bar-track">
                        <div class="bar e" style="width: 16.06%;;"></div>
                    </div>
                    <div class="value">40 (16.06%)</div>
                </li>
                <li class="letter">
                    <div class="letters">
                        <p>I</p>
                    </div>
                    <div class="bar-track">
                        <div class="bar i" style="width: 11.65%;"></div>
                    </div>
                    <div class="value">29 (11.65%)</div>
                </li>
                <li class="letter">
                    <div class="letters">
                    <p>T</p>
                    </div>
                    <div class="bar-track">
                        <div class="bar t" style="width: 11.24%;"></div>
                    </div>
                    <div class="value">28 (11.24%)</div>
                </li>
                <li class="letter">
                    <div class="letters">
                        <p>O</p>
                    </div>
                    <div class="bar-track">
                        <div class="bar o" style="width: 8.84%;
                    ">
                        </div>
                    </div>
                    <div class="value">22 (8.84%)</div>
                </li>
                <li class="letter">
                    <div class="letters">
                        <p>N</p>
                    </div>
                    <div class="bar-track">
                        <div class="bar n" style="width: 8.43%;
                    "></div>
                    </div>
                    <div class="value">21 (8.43%)</div>
                </li>
            </ul>
        </section>
        <section>
            <button type="button">
            See more <span>▾</span>
            </button>
        </section>
    </main>
</body>
</html>
